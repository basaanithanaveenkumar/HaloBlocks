jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # <-- critical for trusted publishing
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Build
        run: uv build
      - name: Publish
        run: uv publish   # no env vars for username/password