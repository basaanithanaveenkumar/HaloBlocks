name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    # Correct placement for job-level env vars
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      
      - name: Build
        run: uv build
        
      - name: Publish
        # If you are NOT using PyPI Trusted Publishing (OIDC), 
        # you must provide a token here:
        # env:
        #   UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: uv publish